name: Create Action Release

on:
  pull_request:
    types: [closed]

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Release action changes
        uses: ./.github/actions/github-actions/release-action
        with:
          mode: release
          base_branch: base
          main_branch: main
